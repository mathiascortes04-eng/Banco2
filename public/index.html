<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Capital RP — Acceso</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="with-banner">
<div id="toast-wrap"></div>

<div class="auth-page">
  <div class="auth-card glass">
    <img src="assets/logo.png" alt="Capital Roleplay" class="auth-logo">
    <h1 class="auth-title gradient-text">Banco Capital RP</h1>
    <p class="auth-subtitle">Sistema bancario oficial de Capital Roleplay</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Iniciar sesión</button>
      <button class="tab-btn" data-tab="register">Crear cuenta</button>
    </div>

    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <!-- LOGIN -->
    <form class="auth-form active" id="login-form">
      <div class="field">
        <label>Usuario de Discord</label>
        <input type="text" id="login-discord" placeholder="ej. mathias.crp" required>
      </div>
      <div class="field">
        <label>Nombre IC</label>
        <input type="text" id="login-nombre" placeholder="Nombre de tu personaje" required>
      </div>
      <div class="field">
        <label>Cédula IC</label>
        <input type="text" id="login-cedula" placeholder="1-2345-6789" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="login-submit">Ingresar a mi cuenta</button>
    </form>

    <!-- REGISTER -->
    <form class="auth-form" id="register-form">
      <div class="field">
        <label>Usuario de Discord</label>
        <input type="text" id="reg-discord" placeholder="ej. mathias.crp" required>
      </div>
      <div class="field">
        <label>Nombre IC</label>
        <input type="text" id="reg-nombre" placeholder="Nombre de tu personaje" required>
      </div>
      <div class="field">
        <label>Cédula IC</label>
        <input type="text" id="reg-cedula" placeholder="1-2345-6789" required>
      </div>
      <div class="field">
        <label>Edad IC</label>
        <input type="number" id="reg-edad" placeholder="18" min="18" max="99" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
        <small>Se guarda encriptada con bcrypt — nadie puede verla, ni los administradores.</small>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="register-submit">Crear mi cuenta bancaria</button>
    </form>

    <div class="cr-flag-strip">
      <div style="background:#002B7F"></div><div style="background:#fff"></div>
      <div style="background:#CE1126"></div><div style="background:#fff"></div>
      <div style="background:#002B7F"></div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
